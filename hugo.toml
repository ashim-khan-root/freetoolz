baseURL = 'https://freetoolz.in/'
locale = 'en-US'
title = 'FreeToolz - Free Online Tools & Utilities'
theme = 'freetoolz'
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']

[params]
  description = 'Free online calculators and utilities for CCTV security, construction, health, finance, development, and SEO. All tools run client-side. No signup, no limits, 100% free.'
  author = 'FreeToolz'
  adsense_id = 'ca-pub-4136483487432936'

  [params.seo]
    og_image = '/images/og-home.jpg'
    twitter_site = '@freetoolz'

[permalinks]
  tools = '/tools/:slug'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.8
  filename = 'sitemap.xml'

[minify]
  disableXML = false
  disableHTML = false
  minifyOutput = true
