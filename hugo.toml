baseURL = 'https://freetoolz.in/'
locale = 'en-US'
title = 'FreeToolz - Free Online Tools & Utilities'
theme = 'freetoolz'
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']

[params]
  description = 'Free online tools for everyday tasks. Image resizer, QR code generator, word counter, password generator, color picker and more. Simple, fast, and 100% free.'
  author = 'FreeToolz'
  adsense_id = 'ca-pub-4136483487432936'

  [params.seo]
    og_image = '/favicon.svg'
    twitter_site = '@freetoolz'

[permalinks]
  tools = '/tools/:slug'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.8
  filename = 'sitemap.xml'

[minify]
  disableXML = true
  disableHTML = true
  minifyOutput = true
