<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="{{ "checked.png" | relURL }}">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | FreeToolz{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta name="robots" content="index, follow">

{{ if eq .Section "blog" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "author": { "@type": "Organization", "name": "FreeToolz" },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "mainEntityOfPage": { "@type": "WebPage", "@id": "{{ .Permalink }}" }
}
</script>
{{ else if .IsPage }}
{{ $tools := where site.Pages "Section" "tools" }}
{{ $related := where $tools "Permalink" "ne" .Permalink | first 4 }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "{{ .Title }}",
  "url": "{{ .Permalink }}",
  "description": "{{ .Description }}",
  "applicationCategory": "UtilityApplication",
  "operatingSystem": "All",
  "browserRequirements": "Requires JavaScript",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
}
</script>
{{ end }}

{{ template "_internal/opengraph.html" . }}
{{ template "_internal/twitter_cards.html" . }}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
{{ if .IsPage }}
<link rel="stylesheet" href="{{ "css/tools.css" | relURL }}">
{{ end }}

<script src="{{ "js/animations.js" | relURL }}" defer></script>
