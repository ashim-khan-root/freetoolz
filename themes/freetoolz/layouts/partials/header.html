<header class="site-header">
  <div class="container">
    <a href="{{ site.Home.RelPermalink }}" class="logo">
      <span class="logo-icon">
        <img src="{{ "checked.png" | relURL }}" alt="FreeToolz" width="32" height="32">
      </span>
      <span class="logo-text">Free<span>Toolz</span></span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav" id="main-nav">
      <button class="nav-link cat-dropdown-btn" id="cat-dropdown-btn" aria-haspopup="true" aria-expanded="false">Categories ▾</button>
      <div class="mobile-cat-list">
        {{ range sort hugo.Data.categories "order" }}
        <a href="{{ printf "%s/" .page_slug | relURL }}" class="nav-link" aria-label="{{ .name }}">{{ .icon | safeHTML }} {{ .name }}</a>
        {{ end }}
      </div>
      <span class="nav-sep"></span>
      <a href="{{ "tools/" | relURL }}" class="nav-link">All Tools</a>
      <a href="{{ "blog/" | relURL }}" class="nav-link">Blog</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </nav>
  </div>
  <div class="cat-dropdown-menu" id="cat-dropdown-menu">
    <div class="container">
      <div class="cat-dropdown-menu-grid">
        {{ range sort hugo.Data.categories "order" }}
        <a href="{{ printf "%s/" .page_slug | relURL }}" class="nav-link" aria-label="{{ .name }}">{{ .icon | safeHTML }} {{ .name }}</a>
        {{ end }}
      </div>
    </div>
  </div>
  </div>
</header>
