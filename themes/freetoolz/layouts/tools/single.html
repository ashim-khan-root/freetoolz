{{ define "main" }}
<article class="tool-page" itemscope itemtype="https://schema.org/WebApplication">
  <div class="container">
    <nav class="breadcrumb" itemscope itemtype="https://schema.org/BreadcrumbList">
      <span itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <a href="{{ "" | relURL }}" itemprop="item"><span itemprop="name">Home</span></a>
        <meta itemprop="position" content="1">
      </span>
      <span class="sep">/</span>
      <span itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <a href="{{ "tools/" | relURL }}" itemprop="item"><span itemprop="name">Tools</span></a>
        <meta itemprop="position" content="2">
      </span>
      <span class="sep">/</span>
      <span itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <span itemprop="name">{{ index (split .Title " - ") 0 }}</span>
        <meta itemprop="position" content="3">
      </span>
    </nav>

    <div class="tool-header">
      <h1>{{ .Title }}</h1>
      <p class="tool-description">{{ .Description }}</p>
    </div>

    {{ partial "ad-slot.html" . }}

    <div class="tool-body">
      <div class="tool-widget" id="tool-widget">
        <div class="tool-loading" id="tool-loading">
          <div class="spinner"></div>
          <p>Loading tool...</p>
        </div>
      </div>
    </div>
    <script>
      setTimeout(function(){
        var w = document.getElementById('tool-widget');
        var l = document.getElementById('tool-loading');
        if (w && l && w.querySelector('.tool-loading')) {
          w.innerHTML = '<div class="tool-error" style="text-align:center;padding:48px;color:var(--text-secondary)"><div style="font-size:2.5rem;margin-bottom:12px">&#x26A0;</div><h3 style="margin-bottom:8px;color:var(--text)">Tool failed to load</h3><p>Please refresh the page or try again later.</p></div>';
        }
      }, 8000);
    </script>

    {{ partial "ad-slot.html" . }}

    <div class="tool-content">
      {{ .Content }}
    </div>

    {{ partial "related-tools.html" . }}
  </div>
</article>

{{ $jsPath := printf "js/%s.js" .Params.tool_slug }}
<script src="{{ $jsPath | relURL }}"></script>
{{ end }}
